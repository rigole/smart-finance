version: '3.8'

services:

  
  db:
    image: postgres:15
    container_name: smart-finance-db
    restart: always
    environment:
      POSTGRES_DB: smartfinance
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smartfinance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: