<h2 mat-dialog-title>
<mat-icon [ngClass]="data.type || 'info'">
    {{ getIcon(data.type) }}
  </mat-icon>
  {{ data.title || 'Confirm action' }}
  
</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">
    {{ data.cancelText || 'Cancel' }}
  </button>

  <button mat-raised-button [color]="getColor(data.type)" [mat-dialog-close]="true">
    {{ data.confirmText || 'Confirm' }}
  </button>
</mat-dialog-actions>
